name: CI

on:
  push:
    branches: [ main, 'copilot/**' ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: EnterpriseIntegrationPlatform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests in parallel
        run: |
          pids=()
          exit_code=0

          for project in tests/UnitTests tests/ContractTests tests/WorkflowTests tests/IntegrationTests tests/PlaywrightTests tests/LoadTests; do
            name=$(basename "$project")
            dotnet test "$project" --no-build --configuration Release --verbosity normal \
              --logger "trx;LogFileName=${name}.trx" \
              > "/tmp/${name}.log" 2>&1 &
            pids+=($!)
          done

          for i in "${!pids[@]}"; do
            if ! wait "${pids[$i]}"; then
              exit_code=1
            fi
          done

          for project in tests/UnitTests tests/ContractTests tests/WorkflowTests tests/IntegrationTests tests/PlaywrightTests tests/LoadTests; do
            name=$(basename "$project")
            echo "::group::${name}"
            cat "/tmp/${name}.log"
            echo "::endgroup::"
          done

          exit $exit_code
