name: CI

on:
  push:
    branches: [ main, 'copilot/**' ]

jobs:
  # ── .NET Build + Unit/Contract/Integration/Workflow Tests ───────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: EnterpriseIntegrationPlatform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EnterpriseIntegrationPlatform/src/Admin.Web/clientapp/package-lock.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run .NET tests (Unit, Contract, Integration, Workflow)
        run: >
          dotnet test --no-build --configuration Release --verbosity normal
          --filter "FullyQualifiedName!~PlaywrightTests"

  # ── Vite Frontend Tests (Vitest) ───────────────────────────────────────────
  vitest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: EnterpriseIntegrationPlatform/src/Admin.Web/clientapp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EnterpriseIntegrationPlatform/src/Admin.Web/clientapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test

  # ── Playwright E2E Tests (Browser UI) ──────────────────────────────────────
  playwright-e2e:
    runs-on: ubuntu-latest
    needs: [build-and-test, vitest]
    permissions:
      contents: read

    defaults:
      run:
        working-directory: EnterpriseIntegrationPlatform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EnterpriseIntegrationPlatform/src/Admin.Web/clientapp/package-lock.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Install Playwright browsers
        run: pwsh tests/PlaywrightTests/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Run Playwright E2E tests
        run: >
          dotnet test tests/PlaywrightTests/PlaywrightTests.csproj
          --no-build --configuration Release --verbosity normal
