name: EIP CI

on:
  push:
    branches: [ main, 'copilot/**' ]
    paths:
      - 'EnterpriseIntegrationPlatform/**'
      - '.github/workflows/eip-ci.yml'

jobs:
  # ── .NET Build + Unit/Contract/Integration/Workflow Tests ───────────────────
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: EnterpriseIntegrationPlatform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EnterpriseIntegrationPlatform/src/Admin.Web/clientapp/package-lock.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run .NET tests (Unit, Contract, Integration, Workflow)
        run: >
          dotnet test --no-build --configuration Release --verbosity normal
          --filter "FullyQualifiedName!~PlaywrightTests"

  # ── Vite Frontend Tests (Vitest) ───────────────────────────────────────────
  vitest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: EnterpriseIntegrationPlatform/src/Admin.Web/clientapp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EnterpriseIntegrationPlatform/src/Admin.Web/clientapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test

  # ── Playwright E2E Tests (Browser UI) ──────────────────────────────────────
  playwright-e2e:
    runs-on: ubuntu-latest
    needs: [build-and-test, vitest]
    permissions:
      contents: read

    defaults:
      run:
        working-directory: EnterpriseIntegrationPlatform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: EnterpriseIntegrationPlatform/src/Admin.Web/clientapp/package-lock.json

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull model
        run: |
          ollama serve &
          # Wait for the server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/ > /dev/null 2>&1 && break
            sleep 1
          done
          # Pull a small model suitable for CPU-only CI runners
          ollama pull qwen2.5:0.5b
          # Pre-warm the model (first inference loads weights into RAM)
          curl -sf http://localhost:11434/api/generate \
            -d '{"model":"qwen2.5:0.5b","prompt":"hello","stream":false}' > /dev/null

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Get Playwright version
        id: pw-version
        run: |
          PW_VERSION=$(grep 'Microsoft.Playwright' Directory.Packages.props | grep -oP 'Version="\K[^"]+')
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pwsh tests/PlaywrightTests/bin/Release/net10.0/playwright.ps1 install

      - name: Install Playwright OS dependencies
        run: pwsh tests/PlaywrightTests/bin/Release/net10.0/playwright.ps1 install-deps

      - name: Run Playwright E2E tests
        env:
          Ollama__BaseAddress: http://localhost:11434
          Ollama__Model: "qwen2.5:0.5b"
        run: >
          dotnet test tests/PlaywrightTests/PlaywrightTests.csproj
          --no-build --configuration Release --verbosity normal
