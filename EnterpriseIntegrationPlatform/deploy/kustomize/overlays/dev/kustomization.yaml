apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # OpenClaw.Web: 1 replica, smaller resources for dev
  - target:
      kind: Deployment
      name: openclaw-web
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: openclaw-web
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: openclaw-web
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 250m
                    memory: 256Mi

  # Admin.Api: 1 replica, smaller resources for dev
  - target:
      kind: Deployment
      name: admin-api
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: admin-api
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: admin-api
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 250m
                    memory: 256Mi
