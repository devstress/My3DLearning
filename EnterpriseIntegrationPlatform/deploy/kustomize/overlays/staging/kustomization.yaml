apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # OpenClaw.Web: 2 replicas, medium resources for staging
  - target:
      kind: Deployment
      name: openclaw-web
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: openclaw-web
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: openclaw-web
                resources:
                  requests:
                    cpu: 200m
                    memory: 256Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi

  # Admin.Api: 2 replicas, medium resources for staging
  - target:
      kind: Deployment
      name: admin-api
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: admin-api
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: admin-api
                resources:
                  requests:
                    cpu: 200m
                    memory: 256Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
