apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - pdb-openclaw-web.yaml
  - pdb-admin-api.yaml

patches:
  # OpenClaw.Web: 3 replicas, larger resources for prod
  - target:
      kind: Deployment
      name: openclaw-web
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: openclaw-web
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: openclaw-web
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: 1000m
                    memory: 1024Mi

  # Admin.Api: 3 replicas, larger resources for prod
  - target:
      kind: Deployment
      name: admin-api
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: admin-api
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: admin-api
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: 1000m
                    memory: 1024Mi
