{{- if .Values.openclawWeb.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "eip.fullname" . }}-openclaw-web
  namespace: {{ include "eip.namespace" . }}
  labels:
    {{- include "eip.componentLabels" (dict "Root" . "Component" "openclaw-web") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "eip.fullname" . }}-openclaw-web
  minReplicas: {{ .Values.openclawWeb.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.openclawWeb.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.openclawWeb.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
---
{{- if .Values.adminApi.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "eip.fullname" . }}-admin-api
  namespace: {{ include "eip.namespace" . }}
  labels:
    {{- include "eip.componentLabels" (dict "Root" . "Component" "admin-api") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "eip.fullname" . }}-admin-api
  minReplicas: {{ .Values.adminApi.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.adminApi.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.adminApi.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
