{{- if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eip.fullname" . }}-openclaw-web
  namespace: {{ include "eip.namespace" . }}
  labels:
    {{- include "eip.componentLabels" (dict "Root" . "Component" "openclaw-web") | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
