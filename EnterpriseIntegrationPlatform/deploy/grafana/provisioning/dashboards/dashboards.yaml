apiVersion: 1

providers:
  - name: EIP Dashboards
    orgId: 1
    folder: Enterprise Integration Platform
    folderUid: eip-dashboards
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
