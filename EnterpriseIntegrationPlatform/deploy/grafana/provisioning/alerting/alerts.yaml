apiVersion: 1

groups:
  - orgId: 1
    name: EIP Platform Alerts
    folder: Enterprise Integration Platform
    interval: 1m
    rules:
      - uid: eip-high-error-rate
        title: High Message Error Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(rate(eip_messages_failed_total[5m]))
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(rate(eip_messages_received_total[5m]))
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.05
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    type: last
              expression: $A / $B
              refId: C
              type: math
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Message error rate exceeds 5%"
          description: "The ratio of failed messages to received messages has exceeded 5% over the last 5 minutes."
        labels:
          severity: critical
          team: platform

      - uid: eip-dlq-depth-threshold
        title: DLQ Depth Threshold Exceeded
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(eip_messages_dead_lettered_total[5m]))
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 50
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
              expression: A
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "DLQ depth has exceeded threshold"
          description: "More than 50 messages have been dead-lettered in the last 5 minutes. Investigate processing failures."
        labels:
          severity: warning
          team: platform

      - uid: eip-service-down
        title: Service Down
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: up{job=~".*eip.*|.*openclaw.*|.*admin.*|.*gateway.*|.*ingestion.*|.*workflow.*|.*demo.*"}
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
              expression: A
              refId: B
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Platform service is down"
          description: "One or more EIP services have been unreachable for more than 2 minutes."
        labels:
          severity: critical
          team: platform

      - uid: eip-high-latency
        title: High Processing Latency
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.99, sum by (le) (rate(eip_messages_processing_duration_milliseconds_bucket[5m])))
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 5000
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
              expression: A
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "p99 processing latency exceeds 5 seconds"
          description: "The 99th percentile message processing duration has exceeded 5000ms for 5 minutes."
        labels:
          severity: warning
          team: platform

      - uid: eip-workflow-failures
        title: Temporal Workflow Failures
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(increase(temporal_workflow_failed_total[5m]))
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 10
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
              expression: A
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Temporal workflow failure rate is elevated"
          description: "More than 10 Temporal workflows have failed in the last 5 minutes."
        labels:
          severity: warning
          team: platform
